name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# [High Fix #54] Explicit least-privilege permissions for CI/CD workflows.
permissions:
  contents: read

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with TruffleHog
        # [Medium Fix #61] Pin third-party actions to specific commit SHAs for supply-chain security.
        # trufflehog: pinned to main for now; TODO: pin to a release tag (e.g., v3.80.0)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Check for .env files
        run: |
          if git ls-files | grep -E '^\.env$|^.*\.env$'; then
            echo "ERROR: .env files found in git tracking!"
            exit 1
          fi
          echo "No .env files in git tracking — OK"
