[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.26"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/contracts/=/root/.openclaw/workspace/fidesorigin-demo/apps/contracts/node_modules/@openzeppelin/contracts/",
    "@openzeppelin/contracts-upgradeable/=/root/.openclaw/workspace/fidesorigin-demo/node_modules/.pnpm/@openzeppelin+contracts-upgradeable@4.5.2/node_modules/@openzeppelin/contracts-upgradeable/",
    "@chainlink/contracts/=/root/.openclaw/workspace/fidesorigin-demo/node_modules/.pnpm/@chainlink+contracts@1.3.0_encoding@0.1.13_ethers@6.16.0/node_modules/@chainlink/contracts/",
    "@fidesorigin/contracts/=/root/.openclaw/workspace/fidesorigin-demo/apps/contracts/node_modules/@fidesorigin/contracts/",
]

allow_paths = [
    "/root/.openclaw/workspace/fidesorigin-demo/node_modules/.pnpm",
    "/root/.openclaw/workspace/fidesorigin-demo/apps/contracts/node_modules",
]
