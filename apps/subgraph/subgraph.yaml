specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: RiskRegistry
    network: sepolia
    source:
      abi: RiskRegistry
      address: "0x7a41abE5B170085fDe9d4e0a3BaD47A70bAC52bc"
      startBlock: 7650000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - RiskProfile
        - RiskProfileUpdate
        - SanctionedAddress
      abis:
        - name: RiskRegistry
          file: ./abis/RiskRegistry.json
      eventHandlers:
        - event: RiskProfileUpdated(indexed address,uint8,uint8,bool)
          handler: handleRiskProfileUpdated
        - event: AddressTagged(indexed address,indexed bytes32)
          handler: handleAddressTagged
        - event: SanctionAdded(indexed address,string)
          handler: handleSanctionAdded
        - event: SanctionRemoved(indexed address)
          handler: handleSanctionRemoved
        - event: ContractRegistered(indexed address,bytes32,bool)
          handler: handleContractRegistered
      file: ./src/mappings/riskRegistry.ts
  - kind: ethereum
    name: ComplianceEngine
    network: sepolia
    source:
      abi: ComplianceEngine
      address: "0x50aAaf70b50fB26e588e0d296A4c042943FfB0AC"
      startBlock: 7650000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ComplianceCheck
        - HoldRecord
        - OperationLog
        - ProtocolStats
        - DailyStats
        - HourlyStats
        - DailyStatsAddress
      abis:
        - name: ComplianceEngine
          file: ./abis/ComplianceEngine.json
      eventHandlers:
        - event: ComplianceCheckPerformed(indexed address,indexed uint256,indexed bool,uint256,uint256,bytes32)
          handler: handleComplianceCheckPerformed
        - event: TransactionBlocked(indexed address,indexed address,indexed uint256,address,string,uint256,uint256)
          handler: handleTransactionBlocked
        - event: TransactionQuarantined(indexed address,indexed address,indexed uint256,address,bytes32,uint256,uint256)
          handler: handleTransactionQuarantined
        - event: QuarantineReleased(indexed bytes32,indexed address,uint256)
          handler: handleQuarantineReleased
        - event: RulePaused(indexed bytes32)
          handler: handleRulePaused
        - event: RuleUnpaused(indexed bytes32)
          handler: handleRuleUnpaused
      file: ./src/mappings/complianceEngine.ts
  - kind: ethereum
    name: PolicyEngine
    network: sepolia
    source:
      abi: PolicyEngine
      address: "0x87089F67A61F9643796AE154663A6a9F21196b38"
      startBlock: 7650000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Policy
        - PolicyVersion
        - PolicyEvaluation
        - WalletPolicy
      abis:
        - name: PolicyEngine
          file: ./abis/PolicyEngine.json
      eventHandlers:
        - event: IssuerPolicySet(indexed address,(uint256,uint256,bool,bool,bool,bool,uint256))
          handler: handleIssuerPolicySet
        - event: WalletPolicySet(indexed address,(uint256,uint256,uint256,uint256,bool,bool,bool,address[],address[]))
          handler: handleWalletPolicySet
        - event: PolicyEvaluated(indexed address,indexed address,indexed address,uint256,uint8,string)
          handler: handlePolicyEvaluated
      file: ./src/mappings/policyEngine.ts
  - kind: ethereum
    name: FidesCompliance
    network: sepolia
    source:
      abi: FidesCompliance
      address: "0x945392d7Aabbf8dc4116711bD6c8dD6EF2098594"
      startBlock: 7800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FidesRiskProfile
        - FidesComplianceCheck
        - FidesTransactionBlocked
        - FidesAuditLog
        - FidesRule
      abis:
        - name: FidesCompliance
          file: ./abis/FidesCompliance.json
      eventHandlers:
        - event: RiskProfileUpdated(indexed address,uint8,uint256,indexed address,bytes32,uint256)
          handler: handleRiskProfileUpdated
        - event: ComplianceCheck(indexed address,indexed address,uint256,bool,indexed bytes32,uint256)
          handler: handleComplianceCheck
        - event: TransactionBlocked(indexed address,indexed address,uint256,string,uint256)
          handler: handleTransactionBlocked
        - event: AuditLogCreated(indexed uint256,uint8,indexed address,bytes32,uint256)
          handler: handleAuditLogCreated
        - event: RuleCreated(indexed bytes32,string,uint8,indexed address,uint256)
          handler: handleRuleCreated
        - event: RuleUpdated(indexed bytes32,uint8,indexed address,uint256)
          handler: handleRuleUpdated
      file: ./src/mappings/fidesCompliance.ts
  - kind: ethereum
    name: CompliantStableCoin
    network: sepolia
    source:
      abi: CompliantStableCoin
      address: "0xb47a6520740a54B375e6F3B22bC316B4b02bFbCF"
      startBlock: 7800000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - TokenTransfer
        - TokenTransferBlocked
        - KYCStatus
        - TokenPolicy
      abis:
        - name: CompliantStableCoin
          file: ./abis/CompliantStableCoin.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
        - event: TransferBlocked(indexed address,indexed address,uint256,string)
          handler: handleTransferBlocked
        - event: KYCStatusUpdated(indexed address,bool)
          handler: handleKYCStatusUpdated
        - event: PolicyUpdated(indexed uint256,indexed uint256,bool,bool,bool,bool,uint256)
          handler: handlePolicyUpdated
      file: ./src/mappings/compliantStableCoin.ts
templates: []
