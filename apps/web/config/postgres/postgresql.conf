# ============================================
# FidesOrigin PostgreSQL 配置文件
# 针对区块链数据分析优化的配置
# ============================================

# ============================================
# 连接设置
# ============================================
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# ============================================
# 内存设置
# ============================================
shared_buffers = 1GB                          # 推荐：总内存的 25%
effective_cache_size = 3GB                    # 推荐：总内存的 75%
work_mem = 16MB                               # 每个查询操作的内存
maintenance_work_mem = 256MB                  # 维护操作（VACUUM, CREATE INDEX）的内存
huge_pages = try                              # 尝试使用大页内存

# ============================================
# 写入和检查点
# ============================================
wal_level = replica                           # WAL 级别，支持复制和归档
wal_buffers = 16MB                            # WAL 缓冲区
max_wal_size = 2GB                            # 最大 WAL 大小
min_wal_size = 512MB                          # 最小 WAL 大小
checkpoint_completion_target = 0.9            # 检查点完成目标
random_page_cost = 1.1                        # 随机页访问成本（SSD优化）
effective_io_concurrency = 200                # 有效IO并发数（SSD优化）

# ============================================
# 查询规划器
# ============================================
default_statistics_target = 100               # 默认统计目标
constraint_exclusion = partition              # 分区表约束排除

# ============================================
# 日志设置
# ============================================
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000             # 记录执行超过1秒的查询
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

# ============================================
# 自动清理
# ============================================
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# ============================================
# 时区和本地化
# ============================================
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# ============================================
# 复制和高可用（可选）
# ============================================
# max_wal_senders = 10
# max_replication_slots = 10
# synchronous_commit = local

# ============================================
# 针对大数据分区表的优化
# ============================================
enable_partitionwise_join = on
enable_partitionwise_aggregate = on
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000
