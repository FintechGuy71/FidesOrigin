# ============================================
# FidesOrigin Redis 配置文件
# 缓存和会话存储
# ============================================

# ============================================
# 网络设置
# ============================================
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ============================================
# 安全设置
# ============================================
# 生产环境请取消注释并设置密码
# requirepass redis_secret_2026

# ============================================
# 持久化设置
# ============================================
# RDB 快照
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ============================================
# 内存管理
# ============================================
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ============================================
# 慢查询日志
# ============================================
slowlog-log-slower-than 10000
slowlog-max-len 128

# ============================================
# 客户端连接
# ============================================
maxclients 10000

# ============================================
# 日志设置
# ============================================
loglevel notice
# logfile /data/redis.log

# ============================================
# 事件通知 (用于键过期通知)
# ============================================
notify-keyspace-events Ex

# ============================================
# 高可用配置（可选）
# ============================================
# replicaof <masterip> <masterport>
# masterauth <master-password>
# replica-serve-stale-data yes
# replica-read-only yes
