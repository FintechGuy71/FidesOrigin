<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | FidesOrigin</title>
  <meta name="description" content="The page you are looking for does not exist. Return to FidesOrigin.">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⬡%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg-card: #1a2035;
      --border: #2a3448;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #c9a96e 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .error-container {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
    }
    .error-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 32px;
      background: var(--gradient-primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.15;
    }
    .error-icon svg {
      width: 40px;
      height: 40px;
      stroke: var(--text);
      stroke-width: 2;
      fill: none;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }
    .error-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }
    .error-desc {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: var(--gradient-primary);
      color: white;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(99,102,241,0.4);
    }
    .footer-note {
      margin-top: 48px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .footer-note a {
      color: var(--accent-light);
      text-decoration: none;
    }
    @media (max-width: 480px) {
      .error-code { font-size: 4rem; }
      .error-title { font-size: 1.2rem; }
    }
    @media (max-width: 320px) {
      .error-code { font-size: 3rem; }
      .error-title { font-size: 1rem; }
      .error-icon { width: 60px; height: 60px; }
      .error-container { padding: 30px 16px; }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">
      The page you are looking for does not exist or has been moved.<br>
      Every path on-chain is verifiable — except this one.
    </p>
    <a href="/" class="btn btn-primary">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M3 12l9-9 9 9M12 3v18"/></svg>
      Return Home
    </a>
    <p class="footer-note">
      FidesOrigin — Real-Time On-Chain Compliance<br>
      <a href="https://github.com/FintechGuy71/FidesOrigin">GitHub</a> ·
      <a href="mailto:contact@fidesorigin.com">Contact</a>
    </p>
  </div>
</body>
</html>
