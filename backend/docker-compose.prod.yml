# ============================================================
# FidesOrigin Production Docker Compose
# PostgreSQL 16 + Redis + FastAPI + Nginx
# ============================================================

name: fidesorigin

services:
  # ---------------- PostgreSQL 16 ----------------
  postgres:
    image: postgres:16-alpine
    container_name: fidesorigin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-fidesorigin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-fidesorigin}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only for security
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fidesorigin} -d ${DB_NAME:-fidesorigin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fidesorigin-network

  # ---------------- Redis ----------------
  redis:
    image: redis:7-alpine
    container_name: fidesorigin-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only for security
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fidesorigin-network

  # ---------------- FastAPI Backend ----------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fidesorigin-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DB/Redis host to use service names in Docker network
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"  # Exposed to nginx only (bind to localhost)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - fidesorigin-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ---------------- Nginx Reverse Proxy ----------------
  nginx:
    image: nginx:1.25-alpine
    container_name: fidesorigin-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Mount SSL certificates (optional)
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fidesorigin-network

# ---------------- Volumes ----------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local

# ---------------- Networks ----------------
networks:
  fidesorigin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
