version: '3.8'

# [P1 Fix] 数据库密码不再硬编码，通过 .env 文件或环境变量注入
# 使用方式: POSTGRES_PASSWORD=your_secure_password docker-compose up -d

services:
  api:
    build: .
    container_name: fidesorigin-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://fidesorigin:${POSTGRES_PASSWORD}@db:5432/fidesorigin
      - DATABASE_URL_SYNC=postgresql://fidesorigin:${POSTGRES_PASSWORD}@db:5432/fidesorigin
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - DEBUG=${DEBUG:-false}
      - BLOCKSCOUT_API_KEY=${BLOCKSCOUT_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - fidesorigin-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: fidesorigin-db
    environment:
      - POSTGRES_USER=fidesorigin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=fidesorigin
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fidesorigin-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fidesorigin -d fidesorigin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fidesorigin-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fidesorigin-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build: .
    container_name: fidesorigin-worker
    command: celery -A app.services.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://fidesorigin:${POSTGRES_PASSWORD}@db:5432/fidesorigin
      - DATABASE_URL_SYNC=postgresql://fidesorigin:${POSTGRES_PASSWORD}@db:5432/fidesorigin
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - BLOCKSCOUT_API_KEY=${BLOCKSCOUT_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - fidesorigin-network
    restart: unless-stopped

  migration:
    build: .
    container_name: fidesorigin-migration
    command: alembic upgrade head
    environment:
      - DATABASE_URL_SYNC=postgresql://fidesorigin:${POSTGRES_PASSWORD}@db:5432/fidesorigin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fidesorigin-network
    profiles:
      - migration

volumes:
  postgres_data:
  redis_data:

networks:
  fidesorigin-network:
    driver: bridge
