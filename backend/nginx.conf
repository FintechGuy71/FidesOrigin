# ============================================================
# FidesOrigin Nginx 配置
# 反向代理 + WebSocket 支持 + SSL 占位符
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # 基本配置
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # 限流区域（防止暴力请求）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/m;

    # 上游服务器（FastAPI 后端）
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ==================== HTTP (80) -> HTTPS 跳转 ====================
    server {
        listen 80;
        server_name _;  # 匹配所有域名

        # ACME / Let's Encrypt 挑战路径（自动签发证书时保留）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # 其他请求全部跳转 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ==================== HTTPS (443) ====================
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 证书配置（请替换为实际证书路径）
        # 方式1: 使用 Certbot 自动签发的证书
        # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

        # 方式2: 使用自定义证书
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # SSL 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS（生产环境启用，先注释掉测试通过后再启用）
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # 安全响应头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # 请求体大小限制（与 FastAPI 一致）
        client_max_body_size 10M;
        client_body_buffer_size 128k;

        # 代理超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 通用代理头
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffering off;

        # ==================== 根路径 / ====================
        location / {
            # 限流：一般端点
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://backend;
        }

        # ==================== 健康检查端点 ====================
        location /health {
            # 健康检查不需要限流
            proxy_pass http://backend;
            access_log off;
        }

        location /ready {
            proxy_pass http://backend;
            access_log off;
        }

        # ==================== API 端点 ====================
        location /api/ {
            # 限流：API 端点
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://backend;
        }

        # ==================== WebSocket 支持 ====================
        # Monitor 模块的 WebSocket 连接
        location /api/v1/monitor/ws {
            proxy_pass http://backend;

            # WebSocket 必要头
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # WebSocket 长连接超时（比 ping 间隔大）
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;

            # 禁用缓冲，提高实时性
            proxy_buffering off;
        }

        # 通用 WebSocket 路径（如有其他 ws 端点）
        location /ws/ {
            proxy_pass http://backend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 60s;
            proxy_buffering off;
        }

        # ==================== 静态文件（如有）====================
        # location /static/ {
        #     alias /var/www/static/;
        #     expires 30d;
        #     add_header Cache-Control "public, immutable";
        # }

        # ==================== 错误页面 ====================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
