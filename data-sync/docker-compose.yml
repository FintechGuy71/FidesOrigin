version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fidesorigin-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fidesorigin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-fidesorigin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fidesorigin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-sync:
    build: .
    container_name: fidesorigin-sync
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CHAINALYSIS_API_KEY: ${CHAINALYSIS_API_KEY}
      MISTTRACK_API_KEY: ${MISTTRACK_API_KEY}
      RPC_URL: ${RPC_URL}
      SYNC_PRIVATE_KEY: ${SYNC_PRIVATE_KEY}
      RISK_REGISTRY_CONTRACT: ${RISK_REGISTRY_CONTRACT}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
