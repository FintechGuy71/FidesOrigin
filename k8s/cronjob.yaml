# [Medium Fix #59] PVC for CronJob — ensures data persistence across sync runs.
# TODO: For multi-replica scenarios, use ReadWriteMany (if storage class supports it)
# or switch to an S3-compatible object store for shared state.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fidesorigin-sync-data
  namespace: fidesorigin
  labels:
    app: fidesorigin-data-publisher
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
  storageClassName: standard
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fidesorigin-batch-sync
  namespace: fidesorigin
  labels:
    app: fidesorigin-data-publisher
    job-type: batch-sync
spec:
  # Daily at 03:30 UTC (adjust timezone as needed)
  schedule: "30 3 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: fidesorigin-data-publisher
            job-type: batch-sync
        spec:
          serviceAccountName: fidesorigin-publisher
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: batch-sync
              image: fidesorigin/data-publisher:latest
              imagePullPolicy: Always
              command:
                - node
                - dist/scripts/batch-sync.js
              envFrom:
                - configMapRef:
                    name: fidesorigin-config
              env:
              # [P2-fix] PUBLISHER_PRIVATE_KEY removed from production K8s — plaintext keys
              # should NEVER be used in production. Use KMS or Vault instead.
              # For dev environments, inject via ConfigMap or env manually.
              - name: KMS_PROVIDER
                valueFrom:
                  configMapKeyRef:
                    name: fidesorigin-config
                    key: kms-provider
                    optional: true
              - name: KMS_KEY_ID
                valueFrom:
                  configMapKeyRef:
                    name: fidesorigin-config
                    key: kms-key-id
                    optional: true
              - name: AWS_ACCESS_KEY_ID
                valueFrom:
                  secretKeyRef:
                    name: fidesorigin-keys
                    key: aws-access-key-id
                    optional: true
              - name: AWS_SECRET_ACCESS_KEY
                valueFrom:
                  secretKeyRef:
                    name: fidesorigin-keys
                    key: aws-secret-access-key
                    optional: true
              - name: VAULT_ADDR
                valueFrom:
                  configMapKeyRef:
                    name: fidesorigin-config
                    key: vault-addr
                    optional: true
              - name: VAULT_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: fidesorigin-keys
                    key: vault-token
                    optional: true
              - name: VAULT_SECRET_PATH
                valueFrom:
                  configMapKeyRef:
                    name: fidesorigin-config
                    key: vault-secret-path
                    optional: true
              - name: VAULT_KEY_NAME
                valueFrom:
                  configMapKeyRef:
                    name: fidesorigin-config
                    key: vault-key-name
                    optional: true
              resources:
                # [L-20 Fix] CronJob memory limit raised to match Deployment (1Gi)
                # Batch sync may load large OFAC datasets; 512Mi is insufficient.
                requests:
                  memory: "512Mi"
                  cpu: "250m"
                limits:
                  memory: "1Gi"
                  cpu: "500m"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: sync-data
                  mountPath: /app/data
                  readOnly: false
          volumes:
            - name: sync-data
              persistentVolumeClaim:
                claimName: fidesorigin-sync-data
