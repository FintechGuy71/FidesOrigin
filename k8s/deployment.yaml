apiVersion: apps/v1
kind: Deployment
metadata:
  name: fidesorigin-data-publisher
  namespace: fidesorigin
  labels:
    app: fidesorigin-data-publisher
    tier: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: fidesorigin-data-publisher
  template:
    metadata:
      labels:
        app: fidesorigin-data-publisher
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: fidesorigin-publisher
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: publisher
          # [M-12 Fix] Use immutable digest-pinned image to prevent supply-chain tampering.
          # IMPORTANT: Replace ${IMAGE_DIGEST} with the actual SHA256 digest of the deployed image.
          # Build and push the image, then run:
          #   IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' fidesorigin/data-publisher:latest | cut -d'@' -f2)
          #   sed -i "s|\\${IMAGE_DIGEST}|${IMAGE_DIGEST#sha256:}|g" k8s/deployment.yaml
          image: fidesorigin/data-publisher@sha256:${IMAGE_DIGEST}
          # Fallback for local dev / CI without digest pinning:
          # image: fidesorigin/data-publisher:node-18-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fidesorigin-config
          env:
            # [M-13 Fix] Split secrets by function to limit blast radius
            - name: PUBLISHER_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: fidesorigin-publisher-keys
                  key: publisher-private-key
                  optional: false
            - name: FATF_ORACLE_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: fidesorigin-publisher-keys
                  key: fatf-oracle-private-key
                  optional: false
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: fidesorigin-cloud-keys
                  key: aws-access-key-id
                  optional: true
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fidesorigin-cloud-keys
                  key: aws-secret-access-key
                  optional: true
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fidesorigin-vault-keys
                  key: vault-token
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              # D1-AUDIT1-092 fix: increased from 512Mi for large OFAC sync data
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: logs
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - fidesorigin-data-publisher
                topologyKey: kubernetes.io/hostname
