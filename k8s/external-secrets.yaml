# [Sec-Fix] External Secrets Operator (ESO) configuration template
# ============================================================
# This is an ALTERNATIVE to Sealed Secrets (k8s/sealed-secret-template.yaml).
# Use ESO when you want secrets to be pulled dynamically from a cloud secret
# manager (AWS Secrets Manager, HashiCorp Vault, GCP Secret Manager, Azure Key Vault, etc.)
# rather than stored encrypted in Git.
#
# Prerequisites:
#   1. Install External Secrets Operator:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
#   2. Create a SecretStore (or ClusterSecretStore) with credentials to access
#      your backend. Examples below for AWS Secrets Manager and Vault.
#
#   3. Apply this ExternalSecret CRD. ESO will poll the backend and create/update
#      the target Kubernetes Secret automatically.
#
# Advantages over Sealed Secrets:
#   - Central secret rotation in the cloud provider (no re-commit to Git).
#   - Fine-grained IAM policies (e.g., AWS IRSA for pod-level access control).
#   - Audit trails in the cloud provider (CloudTrail, Vault audit logs).
#
# Trade-offs:
#   - Requires runtime access to the cloud provider (network + credentials).
#   - Slightly more complex setup (SecretStore + IAM + ExternalSecret).
# ============================================================

# ── Example A: AWS Secrets Manager backend ────────────────────────────────
# Uncomment and configure if using AWS Secrets Manager.

# apiVersion: external-secrets.io/v1beta1
# kind: SecretStore
# metadata:
#   name: aws-secrets-manager
#   namespace: fidesorigin
# spec:
#   provider:
#     aws:
#       service: SecretsManager
#       region: us-east-1
#       # Use IRSA (IAM Roles for Service Accounts) on EKS for zero-credential auth.
#       # The service account fidesorigin-publisher must be annotated with the IAM role ARN.
#       auth:
#         jwt:
#           serviceAccountRef:
#             name: fidesorigin-publisher
#             namespace: fidesorigin
# ---
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: fidesorigin-keys-aws
#   namespace: fidesorigin
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     kind: SecretStore
#     name: aws-secrets-manager
#   target:
#     name: fidesorigin-keys
#     creationPolicy: Owner
#   data:
#     - secretKey: publisher-private-key
#       remoteRef:
#         key: fidesorigin/production/publisher-keys
#         property: publisher-private-key
#     - secretKey: fatf-oracle-private-key
#       remoteRef:
#         key: fidesorigin/production/publisher-keys
#         property: fatf-oracle-private-key
#     - secretKey: aws-access-key-id
#       remoteRef:
#         key: fidesorigin/production/cloud-keys
#         property: aws-access-key-id
#     - secretKey: aws-secret-access-key
#       remoteRef:
#         key: fidesorigin/production/cloud-keys
#         property: aws-secret-access-key

