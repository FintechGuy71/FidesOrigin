# k8s/kms-sealed-secret.yaml
# Sealed Secret template for KMS credentials (Bitnami Sealed Secrets)
#
# Usage:
#   1. Generate the actual SealedSecret with kubeseal:
#      kubeseal --controller-namespace=sealed-secrets \
#        --controller-name=sealed-secrets \
#        --format yaml < k8s/kms-sealed-secret.yaml > k8s/kms-sealed-secret-sealed.yaml
#
#   2. Apply the sealed secret:
#      kubectl apply -f k8s/kms-sealed-secret-sealed.yaml
#
#   3. Verify:
#      kubectl get secret fidesorigin-kms-credentials -n fidesorigin
#
# ⚠️  NEVER commit the unsealed (plain) secret to Git.
#     Only commit the sealed version (k8s/kms-sealed-secret-sealed.yaml).

apiVersion: v1
kind: Secret
metadata:
  name: fidesorigin-kms-credentials
  namespace: fidesorigin
  labels:
    app: fidesorigin-data-publisher
type: Opaque
stringData:
  # ──────────────────────────────────────────────────────────────────────
  # AWS KMS (primary)
  # ──────────────────────────────────────────────────────────────────────
  AWS_KMS_KEY_ID: "arn:aws:kms:us-east-1:123456789012:key/aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee"
  AWS_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "AKIAXXXXXXXXXXXXXXXX"
  AWS_SECRET_ACCESS_KEY: "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

  # ──────────────────────────────────────────────────────────────────────
  # Azure Key Vault (optional)
  # ──────────────────────────────────────────────────────────────────────
  AZURE_KEY_VAULT_NAME: ""
  AZURE_KEY_NAME: ""
  AZURE_CLIENT_ID: ""
  AZURE_CLIENT_SECRET: ""
  AZURE_TENANT_ID: ""

  # ──────────────────────────────────────────────────────────────────────
  # HashiCorp Vault (optional)
  # ──────────────────────────────────────────────────────────────────────
  VAULT_ADDR: ""
  VAULT_TOKEN: ""
  VAULT_KEY_PATH: ""
  VAULT_EXPECTED_ADDRESS: ""

  # ──────────────────────────────────────────────────────────────────────
  # GCP KMS (optional)
  # ──────────────────────────────────────────────────────────────────────
  GCP_KMS_KEY_PATH: ""
  GOOGLE_APPLICATION_CREDENTIALS_JSON: ""
