# [L-17 Fix] NetworkPolicy: restrict outbound connections to only required endpoints
# Apply this to the fidesorigin-data-publisher namespace.
#
# NOTE: Standard Kubernetes NetworkPolicy does NOT support FQDN-based filtering.
# To enforce egress rules to specific external domains (listed below), you MUST use
# one of the following approaches:
#   1. Calico NetworkPolicy (networking.projectcalico.org/v1) — supports domains.
#   2. Cilium NetworkPolicy (cilium.io/v2) — supports DNS-aware FQDN filtering.
#   3. Istio Egress Gateway — route all external traffic through a controlled gateway.
#
# Required external domains (FQDN) for this workload:
#   - treasury.gov          (OFAC SDN list)
#   - api.chainalysis.com   (Chainalysis risk data)
#   - api.opensanctions.org (OpenSanctions data)
#   - api.etherscan.io      (Etherscan API)
#   - thegraph.com          (Subgraph gateway)
#   - alchemy.com           (Alchemy RPC)
#   - raw.githubusercontent.com (Metamask phishing list)
#   - any trust anchor oracles required by FATF pipeline
#
# This manifest keeps the standard K8s fallback (allow 443/80 to any) so that
# workloads continue to function in clusters without Calico/Cilium.
# Once Calico/Cilium is installed, replace the "allow 443/80 to any" rules
# with FQDN-based rules. See k8s/networkpolicy-calico.yaml for an example.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fidesorigin-publisher-netpol
  namespace: fidesorigin
  labels:
    app: fidesorigin-data-publisher
spec:
  podSelector:
    matchLabels:
      app: fidesorigin-data-publisher
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping from monitoring (e.g., Prometheus)
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow DNS resolution (kube-dns in any namespace)
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # [L-17-Fix] Allow HTTPS to external APIs.
    # In clusters with Calico/Cilium, REPLACE this with FQDN-based rules.
    # Until then, 443/80 to any target is the least-privilege option available
    # in standard K8s NetworkPolicy.
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # [L-17-Fix] Allow HTTP to external APIs only if needed.
    # Prefer HTTPS (port 443) for all external traffic; remove port 80
    # once all upstream dependencies support TLS.
    - to: []
      ports:
        - protocol: TCP
          port: 80
    # Allow Redis cluster communication (if cluster mode enabled)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
