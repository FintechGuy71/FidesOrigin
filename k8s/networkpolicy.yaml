# [L-17 Fix] NetworkPolicy: restrict outbound connections to only required endpoints
# Apply this to the fidesorigin-data-publisher namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fidesorigin-publisher-netpol
  namespace: fidesorigin
  labels:
    app: fidesorigin-data-publisher
spec:
  podSelector:
    matchLabels:
      app: fidesorigin-data-publisher
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow metrics scraping from monitoring (e.g., Prometheus)
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Allow HTTPS to external APIs (OFAC, Chainalysis, OpenSanctions, Etherscan, Subgraph, Alchemy, RPC)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow HTTP to external APIs if needed (upgrade to HTTPS when possible)
    - to: []
      ports:
        - protocol: TCP
          port: 80
    # Allow Redis cluster communication (if cluster mode enabled)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
