# [Sec-Fix] SealedSecret template — safe to commit to Git
# ============================================================
# What is Sealed Secrets?
#   Sealed Secrets (bitnami-labs/sealed-secrets) lets you encrypt a Kubernetes
#   Secret into a SealedSecret CRD. The sealed version is safe to store in Git
#   because only the cluster's sealed-secrets controller can decrypt it.
#
# How to use:
#   1. Install the controller in your cluster:
#        kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.5/controller.yaml
#
#   2. Install kubeseal CLI (macOS example):
#        brew install kubeseal
#
#   3. Create a raw Secret YAML (e.g., from k8s/secret.yaml), fill in the values
#      in a secure environment (never commit the raw Secret):
#        cat <<EOF > raw-secret.yaml
#        apiVersion: v1
#        kind: Secret
#        metadata:
#          name: fidesorigin-keys
#          namespace: fidesorigin
#        type: Opaque
#        stringData:
#          publisher-private-key: "0x..."
#          fatf-oracle-private-key: "0x..."
#          aws-access-key-id: "AKIA..."
#          aws-secret-access-key: "..."
#          vault-token: "hvs."
#        EOF
#
#   4. Encrypt with kubeseal (this produces the file below):
#        kubeseal --controller-namespace=kube-system \
#                 --controller-name=sealed-secrets \
#                 --format yaml < raw-secret.yaml > k8s/sealed-secret.yaml
#
#   5. Delete the raw secret immediately:
#        rm -f raw-secret.yaml
#
#   6. Commit ONLY the sealed-secret.yaml to Git.
#
#   7. Apply to cluster (the controller auto-decrypts to a regular Secret):
#        kubectl apply -f k8s/sealed-secret.yaml
#
# Scope & Rotation:
#   - Each SealedSecret is namespace-scoped. If you move it to another namespace,
#     you must re-encrypt it with --scope cluster-wide or --scope namespace-wide.
#   - To rotate secrets, re-run kubeseal with new values and re-apply.
# ============================================================

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: fidesorigin-keys
  namespace: fidesorigin
  annotations:
    # [Sec-Fix] sealedsecrets.bitnami.com/cluster-wide: "true"
    # Uncomment the line above if you need this secret to be decryptable
    # in multiple namespaces (cluster-wide scope). Otherwise keep it
    # namespace-scoped (default) for least privilege.
    sealedsecrets.bitnami.com/managed: "true"
spec:
  # The encryptedData block is produced by kubeseal. It is safe to store in Git.
  # After applying, the sealed-secrets controller will create a Secret named
  # "fidesorigin-keys" in the "fidesorigin" namespace with the following keys:
  #   - publisher-private-key   : EVM deployer private key for risk data publishing
  #   - fatf-oracle-private-key : EVM deployer private key for FATF oracle
  #   - aws-access-key-id       : AWS IAM access key (for KMS or S3)
  #   - aws-secret-access-key   : AWS IAM secret key (for KMS or S3)
  #   - vault-token             : HashiCorp Vault token (if using Vault for key management)
  encryptedData:
    # Example (replace with actual kubeseal output):
    # publisher-private-key: AgByA...encrypted...==
    # fatf-oracle-private-key: AgByA...encrypted...==
    # aws-access-key-id: AgByA...encrypted...==
    # aws-secret-access-key: AgByA...encrypted...==
    # vault-token: AgByA...encrypted...==

  template:
    metadata:
      name: fidesorigin-keys
      namespace: fidesorigin
      labels:
        app: fidesorigin-data-publisher
    type: Opaque

---
