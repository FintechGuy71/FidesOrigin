# [Low Fix #65] TODO: Enable authentication for Prometheus scraping.
# Options:
#   1. Add basic_auth to scrape configs (username/password)
#   2. Use bearer_token_file to reference a service account token
#   3. Configure mTLS between Prometheus and the data-publisher pods
# Example:
#   basic_auth:
#     username: prometheus
#     password_file: /etc/prometheus/secrets/prom-password
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fidesorigin-data-publisher'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - fidesorigin
    relabel_configs:
      # Only scrape pods with prometheus.io/scrape annotation = true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      # Override port if prometheus.io/port annotation is present
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      # Override metrics path if annotation is present
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      # Add pod name, namespace, and instance labels
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_node_name]
        action: replace
        target_label: node
    metrics_path: /metrics
